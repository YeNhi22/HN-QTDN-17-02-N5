<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cổng Nhân Viên – Nhóm 5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
:root{--primary:#1e3a5f;--accent:#2d9cdb;--green:#10b981;--red:#ef4444;--yellow:#f59e0b}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--primary);color:white;display:flex;align-items:center;
  justify-content:space-between;padding:12px 20px;gap:12px;position:sticky;top:0;z-index:100}
.topbar .logo{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
.topbar .user-info{display:flex;align-items:center;gap:12px;font-size:13px}
.btn-logout{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 12px;
  border-radius:6px;cursor:pointer;font-size:12px}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.main-content{flex:1;padding:20px;max-width:1200px;margin:0 auto;width:100%}
</style>

<style>
/* ── NAV TABS ── */
.nav-tabs{display:flex;gap:4px;background:white;border-radius:10px;padding:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px;flex-wrap:wrap}
.nav-tab{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;
  font-size:13px;font-weight:500;color:#64748b;background:transparent;transition:.15s}
.nav-tab.active{background:var(--primary);color:white}
.nav-tab:hover:not(.active){background:#f1f5f9}

/* ── CARDS ── */
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat-card{background:#f8fafc;border-radius:10px;padding:14px;text-align:center;
  border-left:4px solid var(--accent)}
.stat-card.green{border-left-color:var(--green)}
.stat-card.red{border-left-color:var(--red)}
.stat-card.yellow{border-left-color:var(--yellow)}
.stat-num{font-size:28px;font-weight:800;color:var(--primary)}
.stat-label{font-size:11px;color:#64748b;margin-top:4px}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:#475569}
input,textarea,select{border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;
  font-size:13px;outline:none;transition:.15s;width:100%;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;
  font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:#2d4a6f}
.btn-success{background:var(--green);color:white}
.btn-danger{background:var(--red);color:white}
.btn-outline{background:white;color:var(--primary);border:1.5px solid var(--primary)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--primary);color:white;padding:10px 12px;text-align:left;font-weight:600}
.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9}
.tbl tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:#d1fae5;color:#065f46}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}

/* ── LOGIN PAGE ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1e3a5f 0%,#2d9cdb 100%);padding:20px}
.login-box{background:white;border-radius:16px;padding:36px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:22px;font-weight:800;color:var(--primary);margin-top:8px}
.login-logo p{font-size:13px;color:#64748b;margin-top:4px}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;display:block}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;display:block}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);
  border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS CONTENT ── */
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── PROFILE ── */
.profile-header{background:linear-gradient(135deg,var(--primary),#2d9cdb);
  border-radius:12px;padding:24px;color:white;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700}
.profile-info h2{font-size:18px;font-weight:700}
.profile-info p{font-size:13px;opacity:.85;margin-top:4px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.info-item p{font-size:14px;font-weight:500;margin-top:2px}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>

</head>
<body>
<div id="app">

<!-- ════════════════════════════════════════
     LOGIN PAGE
════════════════════════════════════════ -->
<div id="login-page" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:40px">🏢</div>
      <h1>Cổng Nhân Viên</h1>
      <p>Hệ thống Quản lý Tài sản – Nhóm 5</p>
    </div>

<!-- ════════════════════════════════════════
     MAIN APP (ẩn khi chưa đăng nhập)
════════════════════════════════════════ -->
<div id="main-page" style="display:none;flex-direction:column;min-height:100vh">
  <!-- TopBar -->

  <!-- Nav -->

      <button class="nav-tab active" onclick="switchTab('tab-home',this)">🏠 Tổng quan</button>
      <button class="nav-tab" onclick="switchTab('tab-profile',this)">👤 Hồ sơ</button>

    </div>

    <!-- ── TAB 2: HỒ SƠ ── -->

<script>
// ══════════════════════════════════════
// CONFIG – đổi port theo cách bạn chạy Odoo:
//   Docker (docker-compose up) → 8071
//   Python thuần (odoo-bin.py) → 8069
// ══════════════════════════════════════
const ODOO_URL = 'http://localhost:8069';

// ── STATE ──────────────────────────────
let currentUser = null;
let selectedPhanBoIds = [];

// ── RPC HELPER ─────────────────────────
async function rpc(model, method, args=[], kwargs={}) {
  const res = await fetch(`${ODOO_URL}/web/dataset/call_kw`, {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      jsonrpc:'2.0', method:'call', id:1,
      params: {model, method, args, kwargs}
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.data?.message || data.error.message);
  return data.result;
}

async function searchRead(model, domain=[], fields=[], limit=100) {
  return rpc(model, 'search_read', [domain], {fields, limit});
}

// ── LOGIN ──────────────────────────────
async function doLogin() {
  const username = document.getElementById('inp-username').value.trim();
  const password = document.getElementById('inp-password').value;
  const alert = document.getElementById('login-alert');
  const spinner = document.getElementById('login-spinner');
  const txt = document.getElementById('login-text');
  alert.className = 'alert'; alert.textContent = '';
  if (!username || !password) {
    alert.className='alert alert-error'; alert.textContent='Vui lòng nhập đầy đủ thông tin'; return;
  }
  spinner.style.display = 'block'; txt.textContent = 'Đang đăng nhập...';
  document.querySelector('#login-page button').disabled = true;
  try {
    // Bước 1: Authenticate Odoo session
    await fetch(`${ODOO_URL}/web/session/authenticate`, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({jsonrpc:'2.0',method:'call',
        params:{db:'quan_ly_btl', login:'admin@admin.com', password:'admin'}})
    });
    // Bước 2: Gọi web_login với thông tin nhân viên
    const result = await rpc('nhan_vien','web_login',[username, password]);
    if (!result.success) {
      alert.className='alert alert-error'; alert.textContent = result.message;
    } else {
      currentUser = {...result.employee, web_username: username};
      localStorage.setItem('employee', JSON.stringify(currentUser));
      showMain();
    }
  } catch(e) {
    alert.className='alert alert-error';
    alert.textContent = 'Không kết nối được Odoo. Kiểm tra lại URL: ' + ODOO_URL;
  } finally {
    spinner.style.display='none'; txt.textContent='Đăng nhập';
    document.querySelector('#login-page button').disabled=false;
  }
}

document.getElementById('inp-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  localStorage.removeItem('employee');
  currentUser = null;
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('inp-password').value = '';
}

// ── SHOW MAIN ──────────────────────────
function showMain() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'flex';
  document.getElementById('topbar-name').textContent =
    '👤 ' + currentUser.ho_ten;
  renderHome();
  renderProfile();
  loadMyAssets();
  loadMyBorrows();
  loadPhongBanOptions();
}

// ── SWITCH TAB ─────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'tab-borrow') loadMyBorrows();
  if (id === 'tab-assets') loadMyAssets();
}
</script>

<script>
// ── RENDER HOME ────────────────────────
function renderHome() {
  document.getElementById('home-content').innerHTML = `
  <div class="profile-header">
    <div class="avatar">${currentUser.ho_ten.charAt(0).toUpperCase()}</div>
    <div class="profile-info">
      <h2>Xin chào, ${currentUser.ho_ten}! 👋</h2>
      <p>${currentUser.chuc_vu || ''} ${currentUser.phong_ban ? '· ' + currentUser.phong_ban : ''}</p>
    </div>
  </div>
  <div class="stat-grid" id="home-stats">
    <div class="stat-card"><div class="stat-num" id="s-ts">…</div><div class="stat-label">Tài sản được giao</div></div>
    <div class="stat-card yellow"><div class="stat-num" id="s-borrow">…</div><div class="stat-label">Đơn mượn đang xử lý</div></div>
    <div class="stat-card green"><div class="stat-num" id="s-done">…</div><div class="stat-label">Đơn đã hoàn thành</div></div>
    <div class="stat-card red"><div class="stat-num" id="s-overdue">…</div><div class="stat-label">Quá hạn trả</div></div>
  </div>`;
  loadHomeStats();
}

async function loadHomeStats() {
  try {
    const ts = await searchRead('phan_bo_tai_san',
      [['nhan_vien_su_dung_id.web_username','=',currentUser.web_username],
       ['trang_thai','=','in-use']], ['id']);
    document.getElementById('s-ts').textContent = ts.length;

    const borrows = await searchRead('don_muon_tai_san',
      [['nhan_vien_muon_id.web_username','=',currentUser.web_username]], ['trang_thai','thoi_gian_tra']);
    const active = borrows.filter(b => ['cho_duyet','da_duyet','dang_muon'].includes(b.trang_thai));
    const done   = borrows.filter(b => b.trang_thai === 'da_tra');
    const overdue= borrows.filter(b => b.trang_thai === 'dang_muon' && new Date(b.thoi_gian_tra) < new Date());
    document.getElementById('s-borrow').textContent = active.length;
    document.getElementById('s-done').textContent   = done.length;
    document.getElementById('s-overdue').textContent= overdue.length;
  } catch(e) {
    console.warn('loadHomeStats:', e);
  }
}

// ── RENDER PROFILE ─────────────────────
function renderProfile() {
  const u = currentUser;
  document.getElementById('profile-content').innerHTML = `
  <div class="profile-header">
    <div class="avatar">${u.ho_ten.charAt(0).toUpperCase()}</div>
    <div class="profile-info">
      <h2>${u.ho_ten}</h2>
      <p>${u.chuc_vu || 'Nhân viên'} · ${u.phong_ban || ''}</p>
    </div>
  </div>
  <div class="card">
    <div class="card-title">👤 Thông tin cá nhân</div>
    <div class="info-grid">
      <div class="info-item"><label>Mã định danh</label><p>${u.ma_dinh_danh || '–'}</p></div>
      <div class="info-item"><label>Họ tên</label><p>${u.ho_ten}</p></div>
      <div class="info-item"><label>Email</label><p>${u.email || '–'}</p></div>
      <div class="info-item"><label>Số điện thoại</label><p>${u.so_dien_thoai || '–'}</p></div>
      <div class="info-item"><label>Phòng ban</label><p>${u.phong_ban || '–'}</p></div>
      <div class="info-item"><label>Chức vụ</label><p>${u.chuc_vu || '–'}</p></div>
      <div class="info-item"><label>Tên đăng nhập</label><p>${u.web_username}</p></div>
      <div class="info-item"><label>Tuổi</label><p>${u.tuoi || '–'}</p></div>
    </div>
  </div>`;
}

// ── TÀI SẢN CỦA TÔI ───────────────────
async function loadMyAssets() {
  const el = document.getElementById('assets-content');
  try {
    const rows = await searchRead('phan_bo_tai_san',
      [['nhan_vien_su_dung_id.web_username','=',currentUser.web_username]],
      ['tai_san_id','ngay_phat','trang_thai','tinh_trang','phong_ban_id','vi_tri_tai_san_id']);
    if (!rows.length) { el.innerHTML='<p style="color:#94a3b8;text-align:center;padding:24px">Chưa có tài sản nào được phân bổ</p>'; return; }
    const TINH_TRANG = {binh_thuong:'✅ Bình thường',dang_muon:'📤 Đang mượn',hu_hong:'⚠️ Hư hỏng',mat:'❌ Mất'};
    el.innerHTML = `
    <div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr>
        <th>#</th><th>Tài sản</th><th>Phòng ban</th><th>Ngày phân bổ</th><th>Trạng thái</th><th>Tình trạng</th>
      </tr></thead>
      <tbody>
      ${rows.map((r,i)=>`<tr>
        <td>${i+1}</td>
        <td><strong>${r.tai_san_id ? r.tai_san_id[1] : '–'}</strong></td>
        <td>${r.phong_ban_id ? r.phong_ban_id[1] : '–'}</td>
        <td>${r.ngay_phat || '–'}</td>
        <td><span class="badge ${r.trang_thai==='in-use'?'badge-green':'badge-gray'}">${r.trang_thai==='in-use'?'Đang dùng':'Không dùng'}</span></td>
        <td>${TINH_TRANG[r.tinh_trang] || r.tinh_trang}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>`;
  } catch(e) { el.innerHTML=`<p style="color:red">Lỗi: ${e.message}</p>`; }
}
</script>

<script>
// ── ĐƠN MƯỢN CỦA TÔI ─────────────────
async function loadMyBorrows() {
  const el = document.getElementById('borrow-content');
  try {
    const rows = await searchRead('don_muon_tai_san',
      [['nhan_vien_muon_id.web_username','=',currentUser.web_username]],
      ['ma_don_muon','ten_don_muon','trang_thai','thoi_gian_muon','thoi_gian_tra','ly_do','so_tai_san'],
      50);
    const BADGE = {
      nhap:'badge-gray',cho_duyet:'badge-yellow',da_duyet:'badge-blue',
      dang_muon:'badge-blue',da_tra:'badge-green',tu_choi:'badge-red',huy:'badge-red'
    };
    const LABEL = {
      nhap:'Nháp',cho_duyet:'Chờ duyệt',da_duyet:'Đã duyệt',
      dang_muon:'Đang mượn',da_tra:'Đã trả',tu_choi:'Từ chối',huy:'Đã hủy'
    };
    if (!rows.length) { el.innerHTML='<p style="color:#94a3b8;text-align:center;padding:24px">Chưa có đơn mượn nào</p>'; return; }
    el.innerHTML = `
    <div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr>
        <th>Mã đơn</th><th>Tên đơn</th><th>Số TS</th><th>Thời gian mượn</th><th>Hạn trả</th><th>Trạng thái</th>
      </tr></thead>
      <tbody>
      ${rows.map(r=>{
        const overdue = r.trang_thai==='dang_muon' && new Date(r.thoi_gian_tra)<new Date();
        return `<tr style="${overdue?'background:#fff7ed':''}">
          <td><strong>${r.ma_don_muon}</strong></td>
          <td>${r.ten_don_muon}</td>
          <td style="text-align:center">${r.so_tai_san||0}</td>
          <td>${r.thoi_gian_muon ? r.thoi_gian_muon.replace('T',' ').slice(0,16) : '–'}</td>
          <td style="color:${overdue?'#dc2626':'inherit'}">${r.thoi_gian_tra ? r.thoi_gian_tra.replace('T',' ').slice(0,16) : '–'}${overdue?' ⚠️':''}</td>
          <td><span class="badge ${BADGE[r.trang_thai]||'badge-gray'}">${LABEL[r.trang_thai]||r.trang_thai}</span></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  } catch(e) { el.innerHTML=`<p style="color:red">Lỗi: ${e.message}</p>`; }
}

// ── TẠO ĐƠN MƯỢN ─────────────────────
let availableAssets = [];

async function loadPhongBanOptions() {
  try {
    const pbs = await searchRead('phong_ban', [], ['id','ten_phong_ban']);
    const sel = document.getElementById('nb-phong-ban');
    pbs.forEach(pb => {
      const opt = document.createElement('option');
      opt.value = pb.id; opt.textContent = pb.ten_phong_ban;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', loadAvailableAssets);
  } catch(e) { console.warn(e); }
}

async function loadAvailableAssets() {
  const pbId = parseInt(document.getElementById('nb-phong-ban').value);
  const el = document.getElementById('nb-tai-san-list');
  selectedPhanBoIds = [];
  if (!pbId) { el.innerHTML='<span style="color:#94a3b8">Chọn phòng ban để xem tài sản có thể mượn</span>'; return; }
  el.innerHTML = '<span style="color:#94a3b8">Đang tải...</span>';
  try {
    availableAssets = await searchRead('phan_bo_tai_san',
      [['phong_ban_id','=',pbId],['trang_thai','=','in-use'],['tinh_trang','=','binh_thuong']],
      ['id','tai_san_id','tinh_trang']);
    if (!availableAssets.length) {
      el.innerHTML='<span style="color:#94a3b8">Không có tài sản sẵn sàng cho mượn</span>'; return;
    }
    el.innerHTML = availableAssets.map(a=>`
      <label style="display:flex;align-items:center;gap:8px;padding:6px 4px;cursor:pointer;
        border-bottom:1px solid #f1f5f9;font-size:13px">
        <input type="checkbox" value="${a.id}" onchange="toggleAsset(this)"
               style="width:auto;border:none"/>
        📦 ${a.tai_san_id ? a.tai_san_id[1] : '–'}
      </label>`).join('');
  } catch(e) { el.innerHTML=`<span style="color:red">Lỗi: ${e.message}</span>`; }
}

function toggleAsset(cb) {
  const id = parseInt(cb.value);
  if (cb.checked) { if (!selectedPhanBoIds.includes(id)) selectedPhanBoIds.push(id); }
  else { selectedPhanBoIds = selectedPhanBoIds.filter(x => x !== id); }
}

async function submitBorrow() {
  const alert = document.getElementById('new-borrow-alert');
  alert.className='alert'; alert.textContent='';
  const ten  = document.getElementById('nb-ten').value.trim();
  const pb   = parseInt(document.getElementById('nb-phong-ban').value);
  const tu   = document.getElementById('nb-tu').value;
  const den  = document.getElementById('nb-den').value;
  const lydo = document.getElementById('nb-ly-do').value.trim();
  if (!ten||!pb||!tu||!den||!lydo) {
    alert.className='alert alert-error'; alert.textContent='Vui lòng điền đầy đủ các trường bắt buộc (*)'; return;
  }
  if (new Date(den) <= new Date(tu)) {
    alert.className='alert alert-error'; alert.textContent='Thời gian trả phải sau thời gian mượn'; return;
  }
  try {
    // Lấy id nhân viên
    const nvs = await searchRead('nhan_vien',
      [['web_username','=',currentUser.web_username]], ['id']);
    if (!nvs.length) throw new Error('Không tìm thấy nhân viên');
    const nvId = nvs[0].id;

    const vals = {
      ten_don_muon: ten,
      phong_ban_cho_muon_id: pb,
      nhan_vien_muon_id: nvId,
      thoi_gian_muon: tu.replace('T',' ') + ':00',
      thoi_gian_tra: den.replace('T',' ') + ':00',
      ly_do: lydo,
    };
    if (selectedPhanBoIds.length) {
      vals.phan_bo_chon_ids = [[6, 0, selectedPhanBoIds]];
    }
    const newId = await rpc('don_muon_tai_san','create',[vals]);
    // Gửi duyệt ngay
    await rpc('don_muon_tai_san','action_gui_duyet',[[newId]]);

    alert.className='alert alert-success';
    alert.textContent='✅ Đã tạo và gửi đơn mượn thành công!';
    // Reset form
    document.getElementById('nb-ten').value='';
    document.getElementById('nb-ly-do').value='';
    document.getElementById('nb-tu').value='';
    document.getElementById('nb-den').value='';
    document.getElementById('nb-phong-ban').value='';
    document.getElementById('nb-tai-san-list').innerHTML='<span style="color:#94a3b8">Chọn phòng ban để xem tài sản có thể mượn</span>';
    selectedPhanBoIds=[];
    loadMyBorrows();
  } catch(e) {
    alert.className='alert alert-error';
    alert.textContent='❌ Lỗi: ' + e.message;
  }
}

// ── ĐỔI MẬT KHẨU ─────────────────────
async function changePassword() {
  const alert = document.getElementById('pw-alert');
  alert.className='alert'; alert.textContent='';
  const old = document.getElementById('pw-old').value;
  const nw  = document.getElementById('pw-new').value;
  const cf  = document.getElementById('pw-confirm').value;
  if (!old||!nw||!cf) {
    alert.className='alert alert-error'; alert.textContent='Vui lòng điền đầy đủ'; return;
  }
  if (nw !== cf) {
    alert.className='alert alert-error'; alert.textContent='Mật khẩu mới không khớp'; return;
  }
  if (nw.length < 6) {
    alert.className='alert alert-error'; alert.textContent='Mật khẩu tối thiểu 6 ký tự'; return;
  }
  try {
    const res = await rpc('nhan_vien','web_change_password',[currentUser.web_username, old, nw]);
    if (res.success) {
      alert.className='alert alert-success'; alert.textContent='✅ Đổi mật khẩu thành công!';
      document.getElementById('pw-old').value='';
      document.getElementById('pw-new').value='';
      document.getElementById('pw-confirm').value='';
    } else {
      alert.className='alert alert-error'; alert.textContent=res.message;
    }
  } catch(e) {
    alert.className='alert alert-error'; alert.textContent='Lỗi: '+e.message;
  }
}

// ── AUTO LOGIN ────────────────────────
(function() {
  const saved = localStorage.getItem('employee');
  if (saved) {
    currentUser = JSON.parse(saved);
    showMain();
  }
})();
</script>
